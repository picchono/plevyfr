<a href=https://plevy.fr/en/testing/ title=English rel=noreferrer aria-label="Change to EN" class=langu>EN</a></div></div><main data-pagefind-body><div class=mediumSection></div><section class="intro min-h-screen flex flex-row justify-start items-center"><div class=contentIntro><p>レヴィ・ピエール</p><p>フランス・国立工芸院教授 ・ デザインチェア 「ジャン・プルーヴェ」</p><p>デザインプラクティスと理論の対応性、特にトランスフォーミングプラクティスとトランスフォーミング科学に関する研究を行なっている。主な研究トピックはエンボディメント理論と日本哲学と文化の日常のデザインとの関係性についてである。コンピエニュ工科大学（フランス）機械工学修士課程、筑波大学感性工学博士課程修了後、コンピエニュ工科大学（フランス）情報・コミュニケーション科学HDR（研究指導資格）を取得。</p></div></section></main><div class=bordTop>&nbsp;</div><div class=bordBottom>&nbsp;</div><div class=bordRight>&nbsp;</div><div class=bordLeft>&nbsp;</div></body></html>
